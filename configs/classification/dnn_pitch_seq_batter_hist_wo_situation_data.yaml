# AtBat Dynamics Model 設定ファイル (Sequence + ResBlock + GELU + Batter History Encoder)
# 過去投球系列を GRU でエンコードし、さらに直近50打席の打撃履歴もエンコードして予測

data:
  dataset_dir: /workspace/datasets/statcast-customized-v2
  output_dir: /workspace/outputs/classification

  categorical_features:
    - p_throws
    - pitch_type
    # - batter
    - stand
    # - base_out_state
    # - count_state
  continuous_features:
    - release_speed
    - release_spin_rate
    - pfx_x
    - pfx_z
    - plate_x
    - plate_z
    - vx0
    - vy0
    - vz0
    - ax
    - ay
    - az
    - sz_top
    - sz_bot
    - plate_z_norm
  ordinal_features:
    # - inning_clipped
    # - is_inning_top
    # - diff_score_clipped
    # - pitch_number_clipped

  target_cls_swing_attempt: swing_attempt
  target_cls_swing_result: swing_result
  target_cls_bb_type: bb_type
  target_reg:
    - launch_speed
    - launch_angle
    - hit_distance_sc
    - spray_angle

model:
  model_scope: classification
  backbone_type: dnn
  backbone_hidden: [512, 256, 128]
  head_hidden: [64]
  head_activation: relu
  dropout: 0.2
  pitch_seq_max_len: 10
  pitch_seq_encoder_type: gru
  pitch_seq_hidden_dim: 64
  pitch_seq_num_layers: 1
  pitch_seq_bidirectional: false
  batter_hist_max_atbats: 50
  batter_hist_max_pitches: 10
  batter_hist_encoder_type: gru
  batter_hist_hidden_dim: 64
  batter_hist_num_layers: 1

train:
  batch_size: 4096
  num_epochs: 20
  lr: 1.0e-3
  weight_decay: 1.0e-5
  num_workers: 8
  device: cuda
  seed: 42

  loss_weight_swing_attempt: 1.0
  loss_weight_swing_result: 1.0
  loss_weight_bb_type: 1.0
  label_smoothing: 0.1
