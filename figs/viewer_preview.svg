<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect width="800" height="44" rx="12" fill="#0f3460"/>
  <rect y="32" width="800" height="12" fill="#0f3460"/>
  <text x="20" y="28" font-family="Segoe UI,Roboto,sans-serif" font-size="16" font-weight="600" fill="#e0e0e0">AtBat Dynamics — Prediction Viewer</text>
  <text x="780" y="28" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#8892a0" text-anchor="end">◀ Prev   42 / 847   Next ▶</text>
  <!-- Summary bar -->
  <rect y="44" width="800" height="28" fill="#16213e" stroke="#2c3e50" stroke-width="1"/>
  <text x="20" y="63" font-family="Segoe UI,Roboto,sans-serif" font-size="12" fill="#8892a0">Ohtani, Shohei (660271) vs Smith, Joe — LAD @ NYY — 2025-04-15 — AB#3</text>
  <!-- Card -->
  <rect x="40" y="86" width="720" height="316" rx="10" fill="#16213e" stroke="#2c3e50" stroke-width="1"/>
  <!-- Section: Input -->
  <text x="60" y="112" font-family="Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#8892a0" letter-spacing="0.5">INPUT</text>
  <text x="60" y="134" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#8892a0">Pitch Type</text>
  <text x="160" y="134" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#e0e0e0">FF (4-Seam Fastball)</text>
  <text x="60" y="154" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#8892a0">Speed</text>
  <text x="160" y="154" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#e0e0e0">96.2 mph</text>
  <text x="60" y="174" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#8892a0">Count</text>
  <text x="160" y="174" font-family="Segoe UI,Roboto,sans-serif" font-size="13" fill="#e0e0e0">1-2</text>
  <!-- Strike zone SVG -->
  <rect x="440" y="100" width="140" height="90" rx="4" fill="#0d1b2a"/>
  <rect x="470" y="112" width="80" height="66" rx="0" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="525" cy="135" r="5" fill="#e94560" stroke="white" stroke-width="1"/>
  <!-- Section: Swing Attempt -->
  <line x1="60" y1="198" x2="740" y2="198" stroke="#2c3e50" stroke-width="1"/>
  <text x="60" y="218" font-family="Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#8892a0" letter-spacing="0.5">SWING ATTEMPT</text>
  <rect x="60" y="226" width="600" height="14" rx="3" fill="#2c3e50"/>
  <rect x="60" y="226" width="474" height="14" rx="3" fill="#e94560"/>
  <text x="670" y="238" font-family="Segoe UI,Roboto,sans-serif" font-size="12" fill="#e0e0e0">79%</text>
  <text x="720" y="238" font-family="Segoe UI,Roboto,sans-serif" font-size="14" fill="#27ae60">✓</text>
  <!-- Section: Swing Result -->
  <line x1="60" y1="252" x2="740" y2="252" stroke="#2c3e50" stroke-width="1"/>
  <text x="60" y="272" font-family="Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#8892a0" letter-spacing="0.5">SWING RESULT</text>
  <text x="60" y="292" font-family="Segoe UI,Roboto,sans-serif" font-size="11" fill="#8892a0">foul</text>
  <rect x="130" y="282" width="300" height="12" rx="3" fill="#2c3e50"/>
  <rect x="130" y="282" width="120" height="12" rx="3" fill="#3498db"/>
  <text x="440" y="293" font-family="Segoe UI,Roboto,sans-serif" font-size="11" fill="#e0e0e0">40%</text>
  <text x="60" y="310" font-family="Segoe UI,Roboto,sans-serif" font-size="11" fill="#8892a0">hit_into_play</text>
  <rect x="130" y="300" width="300" height="12" rx="3" fill="#2c3e50"/>
  <rect x="130" y="300" width="156" height="12" rx="3" fill="#e94560"/>
  <text x="440" y="311" font-family="Segoe UI,Roboto,sans-serif" font-size="11" fill="#e0e0e0">52% ◀ GT</text>
  <text x="720" y="305" font-family="Segoe UI,Roboto,sans-serif" font-size="14" fill="#27ae60">✓</text>
  <text x="60" y="328" font-family="Segoe UI,Roboto,sans-serif" font-size="11" fill="#8892a0">miss</text>
  <rect x="130" y="318" width="300" height="12" rx="3" fill="#2c3e50"/>
  <rect x="130" y="318" width="24" height="12" rx="3" fill="#3498db"/>
  <text x="440" y="329" font-family="Segoe UI,Roboto,sans-serif" font-size="11" fill="#e0e0e0">8%</text>
  <!-- Section: Regression -->
  <line x1="60" y1="342" x2="740" y2="342" stroke="#2c3e50" stroke-width="1"/>
  <text x="60" y="362" font-family="Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#8892a0" letter-spacing="0.5">REGRESSION</text>
  <text x="60" y="382" font-family="Segoe UI,Roboto,sans-serif" font-size="12" fill="#8892a0">launch_speed</text>
  <text x="200" y="382" font-family="Segoe UI,Roboto,sans-serif" font-size="12" fill="#e0e0e0">Pred: 98.4</text>
  <text x="310" y="382" font-family="Segoe UI,Roboto,sans-serif" font-size="12" fill="#27ae60">GT: 99.1</text>
  <text x="420" y="382" font-family="Segoe UI,Roboto,sans-serif" font-size="12" fill="#8892a0">Err: 0.7</text>
  <!-- "Click to open" overlay -->
  <rect x="560" y="360" width="180" height="34" rx="6" fill="#e94560" opacity="0.9"/>
  <text x="650" y="382" font-family="Segoe UI,Roboto,sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">▶ デモを開く</text>
</svg>
